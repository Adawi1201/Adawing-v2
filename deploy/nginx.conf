# =============================================================================
# AdaWing v2 — Nginx 配置
# 用法:
#   1. 修改 server_name 为你的域名
#   2. 复制到 nginx: sudo cp deploy/nginx.conf /etc/nginx/sites-available/adawing
#   3. 启用: sudo ln -s /etc/nginx/sites-available/adawing /etc/nginx/sites-enabled/
#   4. 验证: sudo nginx -t
#   5. 重载: sudo nginx -s reload
# =============================================================================

# ---- 文件上传大小 ----
client_max_body_size 50m;

# ---- HTTP → HTTPS 重定向 (可选) ----
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name localhost;           # ← 替换为你的域名

    # ---- 静态前端 ----
    root /opt/adawing/frontend;
    index index.html;

    # SPA 路由回退 (所有非文件路径都回退到 index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 缓存策略 ----
    # 带 hash 的 JS/CSS 文件永久缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- 后端 API 代理 ----
    location /api/v2/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- MCP 端点 (Streamable-HTTP，需要更长的超时) ----
    location /mcp {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
