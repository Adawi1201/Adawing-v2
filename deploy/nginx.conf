# AdaWing v2 — Nginx (HTTP)
# setup.sh copies this to /etc/nginx/sites-available/adawing
# After obtaining SSL cert, run: sudo certbot --nginx

upstream adawing_backend { server 127.0.0.1:8080; keepalive 32; }

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    root /opt/adawing/frontend;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    location / { try_files $uri $uri/ /index.html; }
    location /assets/ { expires 30d; add_header Cache-Control "public, immutable"; access_log off; }

    location /api/v2/ {
        proxy_pass http://adawing_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /mcp {
        proxy_pass http://adawing_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
